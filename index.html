<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bot Race Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020508;color:#e0f0ff;font-family:'Share Tech Mono',monospace;min-height:100vh}
header{padding:16px 24px;border-bottom:1px solid #0a1f30;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;letter-spacing:6px;color:#00e5ff;text-shadow:0 0 20px #00e5ff55}
.live{display:flex;align-items:center;gap:8px;font-size:.65rem;letter-spacing:2px;color:#00ff88}
.dot{width:7px;height:7px;background:#00ff88;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
main{padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.scard{background:#060d14;border:1px solid #0a1f30;border-radius:10px;padding:12px;text-align:center}
.sval{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;margin-bottom:4px}
.slabel{font-size:.6rem;letter-spacing:2px;color:#4a7a9b;text-transform:uppercase}

/* RACE BARS */
.section{background:#060d14;border:1px solid #0a1f30;border-radius:12px;padding:18px}
.section-title{font-family:'Orbitron',monospace;font-size:.6rem;letter-spacing:4px;color:#00e5ff;margin-bottom:14px}
.race-bars{display:flex;flex-direction:column;gap:8px}
.rbar{display:grid;grid-template-columns:80px 1fr 70px;gap:10px;align-items:center}
.rname{font-size:.65rem;color:#fff}
.rticker{font-size:.55rem;color:#4a7a9b}
.track{height:24px;background:#040c14;border-radius:4px;overflow:hidden;position:relative;border:1px solid #0a1f30}
.fill{height:100%;border-radius:3px;transition:width 1s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:6px}
.fill::after{content:'▶';font-size:.5rem;color:rgba(0,0,0,.6)}
.rstat{text-align:right;font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700}
.rwl{font-size:.55rem;color:#4a7a9b;margin-top:2px;text-align:right}

/* EQUITY CHART */
.chart-wrap{position:relative}
canvas#eqchart{width:100%;height:220px;display:block;border-radius:8px;transition:opacity .3s}

/* BOT CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.bcard{background:#060d14;border:1px solid #0a1f30;border-radius:12px;padding:16px;transition:border-color .3s}
.bcard.long{border-color:#00ff8866}
.bcard.short{border-color:#ff336666}
.bhead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.bname{font-family:'Orbitron',monospace;font-size:.75rem;letter-spacing:2px}
.bsym{font-size:.55rem;color:#4a7a9b;margin-top:3px}
.pill{padding:3px 10px;border-radius:20px;font-size:.6rem;letter-spacing:1px;font-weight:700;text-transform:uppercase}
.pill.w{background:#0a1420;color:#4a7a9b;border:1px solid #0a1f30}
.pill.l{background:#003322;color:#00ff88;border:1px solid #00ff8833}
.pill.s{background:#330011;color:#ff3366;border:1px solid #ff336633}
.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.met{background:#040c14;border-radius:6px;padding:8px}
.ml{font-size:.55rem;color:#4a7a9b;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}
.mv{font-size:.85rem;font-weight:700}
.mv.c{color:#00e5ff}.mv.g{color:#00ff88}.mv.r{color:#ff3366}.mv.y{color:#ffd700}
.minibars{display:flex;gap:2px;align-items:flex-end;height:36px;background:#040c14;border-radius:6px;padding:4px}
.mb{flex:1;border-radius:1px;min-height:2px}
.mb.g{background:#00ff88}.mb.r{background:#ff3366}
.posbar{background:#040c14;border-radius:6px;padding:8px;margin-top:8px;display:none}
.bcard.long .posbar,.bcard.short .posbar{display:block}
.pbh{display:flex;justify-content:space-between;font-size:.6rem;color:#4a7a9b;margin-bottom:5px}
.pbt{height:3px;background:#0a1f30;border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width .5s}
.bcard.long .pbf{background:linear-gradient(90deg,#00ff88,#00e5ff)}
.bcard.short .pbf{background:linear-gradient(90deg,#ff3366,#c084fc)}

/* TRADE LOG */
.logtable{width:100%;border-collapse:collapse;font-size:.7rem}
.logtable th{text-align:left;padding:6px 10px;color:#4a7a9b;font-size:.6rem;letter-spacing:1px;border-bottom:1px solid #0a1f30}
.logtable td{padding:8px 10px;border-bottom:1px solid #040c14}
.badge{padding:2px 8px;border-radius:10px;font-size:.6rem;font-weight:700}
.badge.win{background:#003322;color:#00ff88}
.badge.loss{background:#330011;color:#ff3366}
.badge.open{background:#0a1420;color:#00e5ff}
.badge.long{background:#003322;color:#00ff88}
.badge.short{background:#330011;color:#ff3366}
</style>
</head>
<body>
<header>
  <div class="logo">BOT RACE</div>
  <div class="live"><div class="dot"></div>AO VIVO &nbsp;|&nbsp; <span id="clk">--:--:--</span></div>
</header>
<main>

  <!-- Summary -->
  <div class="summary">
    <div class="scard"><div class="sval" id="s-wins" style="color:#00ff88">0</div><div class="slabel">Total Wins</div></div>
    <div class="scard"><div class="sval" id="s-losses" style="color:#ff3366">0</div><div class="slabel">Total Losses</div></div>
    <div class="scard"><div class="sval" id="s-wr" style="color:#ffd700">--%</div><div class="slabel">Win Rate</div></div>
    <div class="scard"><div class="sval" id="s-active" style="color:#00e5ff">0</div><div class="slabel">Em Posição</div></div>
    <div class="scard"><div class="sval" id="s-pnl" style="color:#00ff88">$0.00</div><div class="slabel">PnL Total</div></div>
  </div>

  <!-- Race bars -->
  <div class="section">
    <div class="section-title">🏁 CORRIDA — WIN RATE</div>
    <div class="race-bars" id="race-bars"></div>
  </div>

  <!-- Bar Chart -->
  <div class="section">
    <div class="section-title">📊 TRADES — ▲ WIN &nbsp;|&nbsp; ▼ LOSS</div>
    <canvas id="barchart" style="width:100%;height:160px;display:block"></canvas>
  </div>

  <!-- Equity Chart -->
  <div class="section">
    <div class="section-title">📈 EQUITY CURVE — Sobe com WIN, Desce com LOSS</div>
    <canvas id="eqchart"></canvas>
    <div id="legend" style="display:flex;flex-wrap:wrap;gap:12px;margin-top:10px"></div>
  </div>

  <!-- Bot cards -->
  <div class="section-title" style="font-family:Orbitron,monospace;font-size:.6rem;letter-spacing:4px;color:#00e5ff;padding:0 4px">STATUS DOS BOTS</div>
  <div class="cards" id="cards"></div>

  <!-- Trade log -->
  <div class="section">
    <div class="section-title">📋 ÚLTIMOS TRADES</div>
    <table class="logtable">
      <thead><tr><th>Hora</th><th>Bot</th><th>Tipo</th><th>Entrada</th><th>Saída</th><th>PnL</th><th>Result</th></tr></thead>
      <tbody id="logbody"></tbody>
    </table>
  </div>

</main>
<script>
// ── CONFIG ──────────────────────────────────────────
const BOTS = [
  {name:"LDO Bot",  symbol:"LDOUSDT", color:"#c084fc", url:"ldo-bot-production.up.railway.app"},
  {name:"WLD Bot",  symbol:"WLDUSDT", color:"#f59e0b", url:"wld-bot-production.up.railway.app"},
  {name:"BCH Bot",  symbol:"BCHUSDT", color:"#10b981", url:"bch-bot-production.up.railway.app"},
  {name:"Keltner",  symbol:"BTCUSDT", color:"#06b6d4", url:"keltner-bot-production.up.railway.app"},
  {name:"XRP Bot",  symbol:"XRPUSDT", color:"#00e5ff", url:"xrp-bot-production-709a.up.railway.app"},
];

// ── STATE ────────────────────────────────────────────
let bots = BOTS.map(b => ({...b, status:"AGUARDANDO", price:0, wins:0, losses:0, candles_held:0, trades:[], recent_candles:[]}));

// Equity curves — cada bot começa em [0] e cresce a cada trade
let equity = BOTS.map(() => [0]);

// ── HELPERS ──────────────────────────────────────────
const wr = (w,l) => (w+l)>0 ? Math.round(w/(w+l)*100) : 0;
const fmt = (v, big) => big ? v.toFixed(2) : v.toFixed(4);

// ── EQUITY UPDATE ─────────────────────────────────────
function updateEquity() {
  bots.forEach((b, i) => {
    let curve = [0], cum = 0;
    b.trades.forEach(t => {
      if (t.result === 'WIN' || t.result === 'LOSS') {
        cum = parseFloat((cum + (t.pnl||0)).toFixed(4));
        curve.push(cum);
      }
    });
    equity[i] = curve;
  });
}

// ── RENDER CHART ──────────────────────────────────────
// Animation progress per bot (0→1)
let animProgress = BOTS.map(() => 1);
let animTargets  = BOTS.map(() => 1);
let animFrame    = null;

function animateChart() {
  let stillAnimating = false;
  animProgress = animProgress.map((p, i) => {
    const target = animTargets[i];
    if (p < target) {
      const next = Math.min(p + 0.04, target);
      if (next < target) stillAnimating = true;
      return next;
    }
    return p;
  });
  renderChart();
  if (stillAnimating) animFrame = requestAnimationFrame(animateChart);
}

// Tamanho anterior de cada equity curve (para detectar novos trades)
let prevEquityLen = BOTS.map(() => 0);

function triggerAnimation() {
  // Só anima bots que tiveram novos trades
  bots.forEach((b, i) => {
    const curLen = equity[i].length;
    if (curLen !== prevEquityLen[i]) {
      animProgress[i] = prevEquityLen[i] > 1 ? (prevEquityLen[i]-1)/(curLen-1) : 0;
      animTargets[i]  = 1;
      prevEquityLen[i] = curLen;
    }
  });
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(animateChart);
}

function renderChart() {
  const canvas = document.getElementById('eqchart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 36;
  const H = 220;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const pad = {top:16, right:90, bottom:24, left:50};
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  // Max points across all bots
  const maxPts = Math.max(...equity.map(c => c.length), 2);

  // Value range
  let all = [0];
  equity.forEach(c => all = all.concat(c));
  let minV = Math.min(...all), maxV = Math.max(...all);
  if (minV === maxV) { minV -= 1; maxV += 1; }
  const mg = (maxV - minV) * 0.15;
  const vMin = minV - mg, vMax = maxV + mg, vRange = vMax - vMin;

  const toX = (j, total) => pad.left + (j / Math.max(total-1,1)) * cW;
  const toY = v => pad.top + cH - ((v - vMin) / vRange) * cH;
  const zeroY = toY(0);

  // Backgrounds
  ctx.fillStyle = '#00ff880a';
  ctx.fillRect(pad.left, pad.top, cW, Math.max(0, zeroY - pad.top));
  ctx.fillStyle = '#ff33660a';
  ctx.fillRect(pad.left, zeroY, cW, Math.max(0, cH - (zeroY - pad.top)));

  // Grid
  for (let g = 0; g <= 4; g++) {
    const v = vMin + (vRange/4)*g;
    const y = toY(v);
    ctx.strokeStyle = '#0a1f3055'; ctx.lineWidth = 1;
    ctx.setLineDash([3,5]);
    ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(pad.left+cW,y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#4a7a9b99'; ctx.font = '8px Share Tech Mono'; ctx.textAlign = 'right';
    ctx.fillText((v>=0?'+':'')+v.toFixed(2), pad.left-4, y+3);
  }

  // Zero line
  ctx.strokeStyle = '#ffffff44'; ctx.lineWidth = 1.5;
  ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left+cW, zeroY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#ffffff66'; ctx.font = 'bold 9px Share Tech Mono'; ctx.textAlign = 'left';
  ctx.fillText('── $0.00', pad.left+cW+4, zeroY+3);
  ctx.fillStyle = '#00ff8855'; ctx.font = '8px Share Tech Mono';
  ctx.fillText('▲ LUCRO', pad.left+cW+4, pad.top+10);
  ctx.fillStyle = '#ff336655';
  ctx.fillText('▼ PREJ.', pad.left+cW+4, pad.top+cH-2);

  // No data yet
  const hasData = equity.some(c => c.length > 1);
  if (!hasData) {
    ctx.fillStyle = '#4a7a9b'; ctx.font = '11px Share Tech Mono'; ctx.textAlign = 'center';
    ctx.fillText('Aguardando trades para animar...', W/2, H/2);
    return;
  }

  // Draw each bot equity line
  bots.forEach((b, i) => {
    const data = equity[i];
    if (!data || data.length < 2) return;
    const col = b.color;

    // Calcula pontos visíveis baseado na animação de CADA bot
    const prog = animProgress[i];
    const visiblePts = Math.max(2, Math.ceil(data.length * prog));
    const visData = data.slice(0, visiblePts);
    const lastV = visData[visData.length - 1];

    // Fill area
    ctx.beginPath();
    visData.forEach((v,j) => { const x=toX(j,data.length),y=toY(v); j===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.lineTo(toX(visData.length-1, data.length), zeroY);
    ctx.lineTo(toX(0, data.length), zeroY);
    ctx.closePath();
    ctx.fillStyle = lastV>=0 ? col+'18' : '#ff336618';
    ctx.fill();

    // Line
    ctx.shadowColor = col; ctx.shadowBlur = 8;
    ctx.strokeStyle = col; ctx.lineWidth = 2.2; ctx.lineJoin = 'round';
    ctx.beginPath();
    visData.forEach((v,j) => { const x=toX(j,data.length),y=toY(v); j===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke(); ctx.shadowBlur = 0;

    ctx.shadowBlur = 0;

    // End dot + label
    const lx = toX(visData.length-1, data.length);
    const ly = toY(lastV);
    ctx.fillStyle = lastV>=0 ? '#00ff88' : '#ff3366';
    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = col; ctx.font = 'bold 9px Share Tech Mono'; ctx.textAlign = 'left';
    ctx.fillText(b.symbol.replace('USDT','')+(lastV>=0?'+':'')+lastV.toFixed(4), lx+8, ly+3);
  });

  // Legend
  const leg = document.getElementById('legend');
  if (leg && leg.children.length===0) {
    bots.forEach(b => {
      const d = document.createElement('div');
      d.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:.6rem;color:#4a7a9b';
      d.innerHTML = `<div style="width:14px;height:3px;border-radius:2px;background:${b.color}"></div>${b.name}`;
      leg.appendChild(d);
    });
  }
}

// ── RENDER RACE BARS ─────────────────────────────────
function renderRace() {
  const el = document.getElementById('race-bars');
  const sorted = [...bots].sort((a,b) => wr(b.wins,b.losses)-wr(a.wins,a.losses));
  el.innerHTML = sorted.map(b => {
    const w = Math.max(3, wr(b.wins,b.losses));
    const isActive = b.status.includes('ATIVO');
    return `<div class="rbar">
      <div><div class="rname">${b.name}</div><div class="rticker">${b.symbol}</div></div>
      <div class="track">
        <div class="fill" style="width:${w}%;background:${b.color}${isActive?'':'99'};${isActive?'box-shadow:0 0 10px '+b.color+'66':''}"></div>
      </div>
      <div><div class="rstat" style="color:${b.color}">${wr(b.wins,b.losses)}%</div><div class="rwl">${b.wins}W/${b.losses}L</div></div>
    </div>`;
  }).join('');
}

// ── RENDER CARDS ─────────────────────────────────────
function renderCards() {
  const el = document.getElementById('cards');
  el.innerHTML = bots.map(b => {
    const isL = b.status.includes('LONG');
    const isS = b.status.includes('SHORT');
    const w = wr(b.wins, b.losses);
    const hpct = Math.min(100, (b.candles_held/120)*100);
    const big = b.price > 100;
    let candles = '';
    if (b.recent_candles && b.recent_candles.length) {
      const maxH = Math.max(...b.recent_candles.map(c=>c.h));
      const minL = Math.min(...b.recent_candles.map(c=>c.l));
      const rng = maxH-minL||1;
      candles = b.recent_candles.slice(-15).map(c => {
        const g = c.c>=c.o;
        const h = Math.max(2, Math.abs(c.c-c.o)/rng*28);
        return `<div class="mb ${g?'g':'r'}" style="height:${h}px;margin-top:auto"></div>`;
      }).join('');
    } else {
      candles = Array(15).fill('<div class="mb g" style="height:6px;opacity:.15;margin-top:auto"></div>').join('');
    }
    return `<div class="bcard ${isL?'long':isS?'short':''}">
      <div class="bhead">
        <div><div class="bname" style="color:${b.color}">${b.name}</div><div class="bsym">${b.symbol}</div></div>
        <div class="pill ${isL?'l':isS?'s':'w'}">${isL?'LONG ▲':isS?'SHORT ▼':'AGUARD.'}</div>
      </div>
      <div class="metrics">
        <div class="met"><div class="ml">Preço</div><div class="mv c">$${b.price>0?fmt(b.price,big):'--'}</div></div>
        <div class="met"><div class="ml">Win Rate</div><div class="mv y">${w}%</div></div>
        <div class="met"><div class="ml">W/L</div><div class="mv"><span class="g">${b.wins}</span>/<span class="r">${b.losses}</span></div></div>
      </div>
      <div class="minibars">${candles}</div>
      <div class="posbar">
        <div class="pbh"><span>EM POSIÇÃO</span><span>${b.candles_held}/120 velas</span></div>
        <div class="pbt"><div class="pbf" style="width:${hpct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER LOG ────────────────────────────────────────
function renderLog() {
  const tbody = document.getElementById('logbody');
  let all = [];
  bots.forEach(b => b.trades.forEach(t => all.push({...t, bname:b.name, bcol:b.color})));
  all.sort((a,b) => b.time > a.time ? 1 : -1);
  if (!all.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#4a7a9b">Aguardando trades...</td></tr>';
    return;
  }
  tbody.innerHTML = all.slice(0,15).map(t => {
    const res = t.result==='WIN'?'win':t.result==='LOSS'?'loss':'open';
    const big = t.entry > 100;
    return `<tr>
      <td>${t.time||'--'}</td>
      <td style="color:${t.bcol}">${t.bname}</td>
      <td><span class="badge ${t.type==='Buy'?'long':'short'}">${t.type==='Buy'?'LONG':'SHORT'}</span></td>
      <td>$${t.entry?fmt(t.entry,big):'--'}</td>
      <td>${t.exit?'$'+fmt(t.exit,big):'-'}</td>
      <td style="color:${t.pnl>0?'#00ff88':t.pnl<0?'#ff3366':'#4a7a9b'}">${t.pnl!=null?(t.pnl>0?'+':'')+t.pnl.toFixed(4):'-'}</td>
      <td><span class="badge ${res}">${t.result}</span></td>
    </tr>`;
  }).join('');
}

// ── RENDER SUMMARY ────────────────────────────────────
function renderSummary() {
  const totW = bots.reduce((a,b)=>a+b.wins,0);
  const totL = bots.reduce((a,b)=>a+b.losses,0);
  const pnl  = bots.reduce((a,b)=>a+b.trades.reduce((s,t)=>s+(t.pnl||0),0),0);
  const active = bots.filter(b=>b.status.includes('ATIVO')).length;
  document.getElementById('s-wins').textContent = totW;
  document.getElementById('s-losses').textContent = totL;
  document.getElementById('s-wr').textContent = wr(totW,totL)+'%';
  document.getElementById('s-active').textContent = active;
  const pe = document.getElementById('s-pnl');
  pe.textContent = (pnl>=0?'+':'')+'$'+pnl.toFixed(2);
  pe.style.color = pnl>=0?'#00ff88':'#ff3366';
}

// ── FULL RENDER ───────────────────────────────────────
function renderBarChart() {
  const canvas = document.getElementById('barchart');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 36;
  const H = 160;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  // Coleta todos os trades de todos os bots em ordem
  let allTrades = [];
  bots.forEach(b => {
    b.trades.forEach(t => {
      if (t.result === 'WIN' || t.result === 'LOSS') {
        allTrades.push({ result: t.result, pnl: t.pnl || 0, color: b.color, name: b.symbol.replace('USDT','') });
      }
    });
  });

  if (!allTrades.length) {
    ctx.fillStyle = '#4a7a9b';
    ctx.font = '11px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText('Aguardando trades...', W/2, H/2);
    return;
  }

  const pad = { top: 20, bottom: 20, left: 10, right: 10 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;
  const zeroY = pad.top + cH / 2;

  // Zero line
  ctx.strokeStyle = '#ffffff33';
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(pad.left, zeroY); ctx.lineTo(pad.left + cW, zeroY); ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = '#00ff8844';
  ctx.font = '8px Share Tech Mono';
  ctx.textAlign = 'right';
  ctx.fillText('▲ WIN', pad.left + cW, pad.top + 8);
  ctx.fillStyle = '#ff336644';
  ctx.fillText('▼ LOSS', pad.left + cW, pad.top + cH - 2);

  // Max pnl for scale
  const maxPnl = Math.max(...allTrades.map(t => Math.abs(t.pnl)), 0.01);
  const barW = Math.max(4, Math.min(28, cW / allTrades.length - 2));
  const gap   = cW / allTrades.length;

  allTrades.forEach((t, i) => {
    const isWin = t.result === 'WIN';
    const barH  = Math.max(6, (Math.abs(t.pnl) / maxPnl) * (cH / 2 - 4));
    const x     = pad.left + i * gap + gap/2 - barW/2;
    const y     = isWin ? zeroY - barH : zeroY;

    // Gradient
    const grad = ctx.createLinearGradient(x, isWin ? y : y + barH, x, isWin ? y + barH : y);
    if (isWin) {
      grad.addColorStop(0, t.color);
      grad.addColorStop(1, t.color + '44');
    } else {
      grad.addColorStop(0, '#ff336644');
      grad.addColorStop(1, '#ff3366');
    }

    // Glow
    ctx.shadowColor = isWin ? t.color : '#ff3366';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = grad;

    // Rounded bar
    const r = Math.min(3, barW/2);
    ctx.beginPath();
    if (isWin) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, y + barH);
      ctx.lineTo(x, y + barH);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x + barW, y);
      ctx.lineTo(x + barW, y + barH - r);
      ctx.quadraticCurveTo(x + barW, y + barH, x + barW - r, y + barH);
      ctx.lineTo(x + r, y + barH);
      ctx.quadraticCurveTo(x, y + barH, x, y + barH - r);
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Bot name label (só se couber)
    if (barW > 12) {
      ctx.fillStyle = isWin ? t.color : '#ff3366';
      ctx.font = '7px Share Tech Mono';
      ctx.textAlign = 'center';
      ctx.fillText(t.name, x + barW/2, isWin ? y - 3 : y + barH + 9);
    }

    // PnL value no topo/base
    if (barH > 16) {
      ctx.fillStyle = '#ffffff88';
      ctx.font = '7px Share Tech Mono';
      ctx.textAlign = 'center';
      const label = (t.pnl >= 0 ? '+' : '') + t.pnl.toFixed(2);
      ctx.fillText(label, x + barW/2, isWin ? y + barH - 3 : y + 9);
    }
  });
}

function render() {
  updateEquity();
  renderSummary();
  renderRace();
  renderBarChart();
  triggerAnimation();
  renderCards();
  renderLog();
}

// ── DEMO DATA ─────────────────────────────────────────
let tick = 0;
const demoSeeds = [
  [ 0.05,-0.03, 0.08, 0.04,-0.02, 0.07, 0.03,-0.04, 0.06, 0.02,-0.01, 0.09],
  [-0.02, 0.04,-0.03, 0.06, 0.05,-0.02, 0.08,-0.01, 0.03, 0.07,-0.04, 0.02],
  [ 0.03, 0.06,-0.02, 0.04, 0.07,-0.03, 0.05, 0.02,-0.01, 0.08, 0.04,-0.02],
  [-0.04, 0.02, 0.05,-0.03, 0.06, 0.04,-0.02, 0.07, 0.03,-0.01, 0.05, 0.02],
  [ 0.07,-0.02, 0.04, 0.06,-0.03, 0.08, 0.02, 0.05,-0.01, 0.04, 0.06,-0.02],
];
const demoPrices = [1.42, 2.31, 543.20, 94200.50, 2.18];
const demoStatuses = ["AGUARDANDO","LONG ATIVO","SHORT ATIVO","AGUARDANDO","LONG ATIVO"];

function loadDemo() {
  bots = BOTS.map((b,i) => {
    const seeds = demoSeeds[i];
    const count = Math.min(tick+1, seeds.length);
    const trades = seeds.slice(0,count).map((pnl,j) => ({
      type: pnl>0?'Buy':'Sell',
      entry: demoPrices[i],
      exit:  demoPrices[i]+pnl,
      pnl:   parseFloat(pnl.toFixed(4)),
      time:  new Date(Date.now()-(count-j)*5*60000).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      result: pnl>0?'WIN':'LOSS'
    }));
    return {
      ...b,
      status: demoStatuses[i],
      price: demoPrices[i]+(Math.random()-.5)*demoPrices[i]*0.002,
      wins: trades.filter(t=>t.result==='WIN').length,
      losses: trades.filter(t=>t.result==='LOSS').length,
      candles_held: [0,45,20,0,80][i],
      trades,
      recent_candles: Array(15).fill(0).map(()=>{
        const o=demoPrices[i]+(Math.random()-.5)*demoPrices[i]*0.002;
        const c=o+(Math.random()-.5)*demoPrices[i]*0.001;
        return {o,c,h:Math.max(o,c)+demoPrices[i]*0.0005,l:Math.min(o,c)-demoPrices[i]*0.0005};
      })
    };
  });
  tick = (tick+1) % Math.max(...demoSeeds.map(s=>s.length));
}

// ── FETCH REAL BOTS ───────────────────────────────────
async function fetchBot(i) {
  const url = BOTS[i].url;
  if (!url) return;
  try {
    const r = await fetch(url+'/api', {signal:AbortSignal.timeout(5000)});
    const d = await r.json();
    bots[i] = {...bots[i], ...d};
  } catch(e) { bots[i].status = 'OFFLINE'; }
}

// ── CLOCK ─────────────────────────────────────────────
setInterval(()=>{ document.getElementById('clk').textContent = new Date().toLocaleTimeString('pt-BR'); }, 1000);

// ── INIT ──────────────────────────────────────────────
const hasUrls = BOTS.some(b=>b.url);
if (!hasUrls) {
  // Primeiro carrega todos os trades de uma vez
  tick = Math.max(...demoSeeds.map(s=>s.length)) - 1;
  loadDemo();
  render();

  // Depois reinicia e vai adicionando 1 trade por vez animadamente
  setTimeout(() => {
    tick = 0;
    loadDemo();
    render();
    setInterval(()=>{ loadDemo(); render(); }, 1200);
  }, 800);
} else {
  Promise.all(BOTS.map((_,i)=>fetchBot(i))).then(render);
  setInterval(()=>{ Promise.all(BOTS.map((_,i)=>fetchBot(i))).then(render); }, 5000);
}
</script>
